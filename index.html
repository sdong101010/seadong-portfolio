      function FadingVideo({ src, className, style }) {
        const videoRef = React.useRef(null);
        const fadingOutRef = React.useRef(false);
        const rafRef = React.useRef(0);

        React.useEffect(() => {
          const video = videoRef.current;
          if (!video) return;
          const FADE_MS = 500;
          const FADE_OUT_LEAD = 0.55;

          const fadeTo = (target, duration) => {
            cancelAnimationFrame(rafRef.current);
            const start = parseFloat(video.style.opacity || "0");
            const startTime = performance.now();
            const tick = () => {
              const elapsed = performance.now() - startTime;
              const t = Math.min(1, elapsed / duration);
              const v = start + (target - start) * t;
              video.style.opacity = v.toFixed(3);
              if (t < 1) rafRef.current = requestAnimationFrame(tick);
            };
            rafRef.current = requestAnimationFrame(tick);
          };

          const onLoadedData = () => {
            video.style.opacity = "0";
            video.play().catch(() => {});
            fadeTo(1, FADE_MS);
          };
          const onTimeUpdate = () => {
            if (!fadingOutRef.current && video.duration) {
              const remaining = video.duration - video.currentTime;
              if (remaining <= FADE_OUT_LEAD && remaining > 0) {
                fadingOutRef.current = true;
                fadeTo(0, FADE_MS);
              }
            }
          };
          const onEnded = () => {
            video.style.opacity = "0";
            setTimeout(() => {
              video.currentTime = 0;
              video.play().catch(() => {});
              fadingOutRef.current = false;
              fadeTo(1, FADE_MS);
            }, 100);
          };

          video.addEventListener("loadeddata", onLoadedData);
          video.addEventListener("timeupdate", onTimeUpdate);
          video.addEventListener("ended", onEnded);
          return () => {
            cancelAnimationFrame(rafRef.current);
            video.removeEventListener("loadeddata", onLoadedData);
            video.removeEventListener("timeupdate", onTimeUpdate);
            video.removeEventListener("ended", onEnded);
          };
        }, [src]);

        return (
          <video
            ref={videoRef}
            src={src}
            autoPlay
            muted
            playsInline
            preload="auto"
            aria-hidden="true"
            className={className}
            style={{ opacity: 0, ...(style || {}) }}
          />
        );
      }
      window.FadingVideo = FadingVideo;
    </script>

    <script type="text/babel" data-presets="react">
      function BlurText({ text, className }) {
        const ref = React.useRef(null);
        const [inView, setInView] = React.useState(false);

        React.useEffect(() => {
          const node = ref.current;
          if (!node) return;
          const obs = new IntersectionObserver(
            (entries) => {
              entries.forEach((e) => {
                if (e.isIntersecting) {
                  setInView(true);
                  obs.disconnect();
                }
              });
            },
            { threshold: 0.1 }
          );
          obs.observe(node);
          return () => obs.disconnect();
        }, []);

        const words = text.split(" ");
        const { motion } = window.Motion;

        return (
          <p
            ref={ref}
            className={className}
            style={{
              display: "flex",
              flexWrap: "wrap",
              justifyContent: "center",
              rowGap: "0.1em",
            }}
          >
            {words.map((w, i) => (
              <motion.span
                key={i}
                initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
                animate={
                  inView
                    ? {
                        filter: ["blur(10px)", "blur(5px)", "blur(0px)"],
                        opacity: [0, 0.5, 1],
                        y: [50, -5, 0],
                      }
                    : { filter: "blur(10px)", opacity: 0, y: 50 }
                }
                transition={{
                  duration: 0.7,
                  times: [0, 0.5, 1],
                  ease: "easeOut",
                  delay: (i * 100) / 1000,
                }}
                style={{ display: "inline-block", marginRight: "0.28em" }}
              >
                {w}
              </motion.span>
            ))}
          </p>
        );
      }
      window.BlurText = BlurText;
    </script>
